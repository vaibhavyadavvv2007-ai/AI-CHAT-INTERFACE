<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-label="AI chat interface animated preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#11111f"/>
    </linearGradient>
    <linearGradient id="user" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>

  <rect x="24" y="24" width="252" height="732" rx="18" fill="#11111f" stroke="#2a2a44"/>
  <rect x="46" y="48" width="208" height="54" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <rect x="46" y="126" width="208" height="42" rx="12" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="46" y="176" width="208" height="42" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <rect x="46" y="226" width="208" height="42" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <rect x="46" y="276" width="208" height="42" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <rect x="46" y="326" width="208" height="42" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <text x="62" y="82" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">+ New Chat</text>
  <text x="62" y="153" fill="#e5e7eb" font-family="Arial, Helvetica, sans-serif" font-size="16">React explanation</text>
  <text x="62" y="203" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="16">AI market trends</text>
  <text x="62" y="253" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="16">RAG systems</text>
  <text x="62" y="303" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="16">Project notes</text>
  <text x="62" y="353" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="16">Saved prompts</text>

  <text x="336" y="88" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">Ask our AI anything</text>
  <text x="336" y="125" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="18">Streaming responses, chat history, and a responsive dark layout.</text>

  <rect x="336" y="188" width="630" height="86" rx="22" fill="#2b2b3d" stroke="#3b3b55"/>
  <text x="364" y="236" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="18">Hello! How can I help you today?</text>

  <rect x="504" y="298" width="462" height="86" rx="22" fill="url(#user)"/>
  <text x="532" y="347" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="18">Explain React hooks.</text>
  <rect x="935" y="326" width="12" height="28" rx="6" fill="#ffffff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <rect x="336" y="412" width="682" height="82" rx="22" fill="#2b2b3d" stroke="#3b3b55"/>
  <text x="364" y="457" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="18">They let you use state and lifecycle features in function components.</text>

  <rect x="336" y="518" width="350" height="62" rx="18" fill="#2b2b3d" stroke="#3b3b55" opacity="0.95">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <circle cx="372" cy="549" r="6" fill="#cbd5e1">
    <animate attributeName="cy" values="549;543;549" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="394" cy="549" r="6" fill="#94a3b8">
    <animate attributeName="cy" values="549;543;549" dur="1s" begin="0.15s" repeatCount="indefinite"/>
  </circle>
  <circle cx="416" cy="549" r="6" fill="#64748b">
    <animate attributeName="cy" values="549;543;549" dur="1s" begin="0.3s" repeatCount="indefinite"/>
  </circle>

  <rect x="336" y="660" width="728" height="70" rx="20" fill="#24243a" stroke="#3b3b55"/>
  <rect x="356" y="679" width="620" height="32" rx="12" fill="#1a1a2e" fill-opacity="0.75"/>
  <rect x="1000" y="672" width="48" height="48" rx="14" fill="url(#accent)">
    <animate attributeName="fill-opacity" values="1;0.8;1" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <path d="M1017 696L1033 688L1027 704Z" fill="#ffffff"/>
  <rect x="356" y="679" width="0" height="32" rx="12" fill="#334155">
    <animate attributeName="width" values="0;180;360;540;620" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <rect x="24" y="24" width="1352" height="732" rx="18" fill="none" stroke="#2a2a44" stroke-opacity="0.25"/>
</svg>
